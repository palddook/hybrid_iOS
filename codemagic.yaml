workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.starcc.greenit
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Pod install
        script: |
          find . -maxdepth 1 -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "starcc.xcworkspace" \
            --scheme "starcc"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    # publishing: App Store Connect 배포는 API 키 연결 후 활성화
    # Team Settings → Integrations → App Store Connect에서 키 등록 필요
